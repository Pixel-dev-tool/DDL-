<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <script src="Auth.js"></script>
<title>Login</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  width: 300px;
}

h2 {
  text-align: center;
  color: #2b7cff;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #2b7cff;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1a5ed8;
}

#message {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Connexion</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Se connecter</button>

  <p id="message"></p>
</div>

<script>
// Ton webhook pour le login
const LOGIN_WEBHOOK = "https://hook.us2.make.com/mpe4vm531rlkeltrmi70ksa1vi6wfnpq";

// Fonction de login
async function login() {
  const res = await fetch(LOGIN_WEBHOOK, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });
// Récupération de la réponse
  const data = await res.json();

// Si le login est réussi
  if (data.success) {

    const expireTime = new Date().getTime() + 60 * 60 * 60 * 1000; // 1 heurer

    // session simple (token)
    sessionStorage.setItem("token", data.token);
    sessionStorage.setItem("expireTime", expireTime);
    sessionStorage.setItem("Wohnung", "wir sind im Student List.");
    
    document.getElementById("message").style.color = "green";
    document.getElementById("message").innerText = "Connexion réussie";

    // redirection vers dashboard
    setTimeout(() => {
      window.location.href = "list.html";
    }, 1000);

  } else {
    document.getElementById("message").style.color = "red";
    document.getElementById("message").innerText = "Login incorrect";
  }
}
</script>

</body>
